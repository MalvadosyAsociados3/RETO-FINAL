# Parametros para el Puzzlebot REAL en el Final Challenge.
# Difiere de final_challenge_params.yaml en:
#   - El EKF espera la observacion ya en frame 'base' (aruco_ros en el Jetson
#     hace la TF con reference_frame=base).
#   - marker_size = 0.165 m segun el OneNote (en sim usamos 0.18, pero en
#     real el marker fisico mide 16.5 cm).
#   - waypoints, mapa de markers y camera offset deben ajustarse al setup
#     fisico real. Los valores aqui son una plantilla.

# --- EKF ---
ekf_localisation:
  ros__parameters:
    wheel_radius: 0.05
    wheel_base:   0.19
    update_rate:  50.0
    publish_map_odom_tf: true
    odom_frame: odom
    base_frame: base_footprint
    world_frame: map
    initial_x:     0.0
    initial_y:     0.0
    initial_theta: 0.0
    # Ruido por rueda (a calibrar contra el encoder real)
    kr: 0.03
    kl: 0.03
    # Camara: offset respecto a base_footprint en el robot fisico.
    # Mide tu Puzzlebot y ajusta. La camara va al frente, al centro.
    camera_x:    0.085
    camera_y:    0.0
    camera_yaw:  0.0
    # Frame de la observacion: aruco_ros con reference_frame=base ya lo da
    # en base, asi que NO hay que reconvertirlo.
    observation_frame: 'base'
    # Ruido de medicion ArUco (m^2)
    aruco_var_base:      0.01
    aruco_var_per_meter: 0.005
    aruco_max_distance:  3.5
    # Mapa de markers (PLANTILLA). Pon aqui los IDs y posiciones (x, y, yaw)
    # de los markers que vayas a colocar en la pista real.
    marker_ids:   [0,    1,    2,    3]
    marker_xs:    [2.0,  2.0, -1.0, -1.0]
    marker_ys:    [0.0,  2.0,  2.0,  0.0]
    marker_yaws:  [3.1416, -1.5708, 0.0, 1.5708]

# --- Multi-point nav -> /pre_cmd_vel ---
multi_point_nav:
  ros__parameters:
    control_rate: 20.0
    goal_tolerance: 0.20
    k_linear:  0.40
    k_angular: 1.2
    max_linear: 0.15      # mas conservador que sim (0.18)
    max_angular: 0.9
    align_threshold_deg: 25.0

# --- Obstacle avoidance: /pre_cmd_vel -> /cmd_vel ---
obstacle_avoidance:
  ros__parameters:
    control_rate: 20.0
    obstacle_distance: 0.5
    forward_cone_deg: 30.0
    wall_target_distance: 0.35
    wall_sector_min_deg: 60.0
    wall_sector_max_deg: 120.0
    wall_k: 2.5
    wall_linear: 0.08      # mas lento que sim
    max_angular: 0.9
    clear_front_hysteresis: 1.3
    publish_zero_when_idle: true

# --- Trayectoria (PLANTILLA: ajustar a la pista real) ---
point_generator:
  ros__parameters:
    waypoints_x: [ 1.0,  1.5,  0.5,  0.0]
    waypoints_y: [ 0.5,  1.5,  1.5,  0.0]
    loop_trajectory: true
    startup_delay: 3.0
    frame_id: odom

# --- Adapter aruco_ros -> nuestro msg ---
aruco_ros_bridge:
  ros__parameters:
    input_topic:  '/marker_publisher/markers'
    output_topic: '/aruco_detections'

# --- Covarianza viz ---
covariance_visualizer:
  ros__parameters:
    sigma_scale: 2.0
    min_axis: 0.05
    marker_frame: ''
