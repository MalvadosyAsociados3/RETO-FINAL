# Parametros para el Puzzlebot REAL en el Final Challenge.
#
# Layout: 8 markers ArUco distribuidos en una pista tipo laberinto.
# IDs (del boceto del usuario): 70, 706, 75, 701, 703, 705, 708, 702.
# Diccionario por defecto de chev.me/arucogen: DICT_ARUCO_ORIGINAL (1024 markers).
#
# Sistema de coordenadas:
#   - Origen (0,0) = posicion del Puzzlebot al arrancar.
#   - +X = forward inicial del robot (la direccion a la que apunta al arrancar).
#   - +Y = izquierda inicial del robot (REP-103).
#   - theta=0 = apuntando a +X.
#
# Las posiciones de los markers AQUI ABAJO SON UNA PLANTILLA basada en el
# boceto. Hay que MEDIR con cinta metrica la distancia de cada marker al
# origen (X, Y en metros) y su orientacion (yaw: angulo entre la normal del
# marker y el eje +X global).
#
# Truco para el yaw del marker:
#   yaw = 0       -> el marker mira a +X (su normal apunta a +X global)
#   yaw = pi/2    -> el marker mira a +Y (normal hacia la izquierda global)
#   yaw = pi      -> mira a -X (su cara visible es la "espalda" si caminas hacia +X)
#   yaw = -pi/2   -> mira a -Y
# Como regla rapida: pon el marker en su pared, calcula a que direccion apunta
# su CARA con respecto al mundo.

# --- EKF ---
ekf_localisation:
  ros__parameters:
    wheel_radius: 0.05
    wheel_base:   0.19
    update_rate:  50.0
    publish_map_odom_tf: true
    odom_frame: odom
    base_frame: base_footprint
    world_frame: map

    # Pose inicial cuando colocas el robot fisicamente con su PARTE TRASERA
    # en la esquina (0,0) inferior-izquierda del laberinto.
    # Segun tu medicion, el CENTRO del robot queda en (0.325, -0.28) m.
    # +X apunta "hacia adentro" del laberinto (vertical hacia arriba en el
    # mapa), +Y a la izquierda del robot (=al norte del mapa).
    # Si vas a poner el robot en otra parte, ajusta estos 3 numeros.
    initial_x:     0.325
    initial_y:    -0.28
    initial_theta: 0.0

    # Ruido por rueda (calibrar). Empiezo conservador en real.
    kr: 0.03
    kl: 0.03

    # Camara: offset respecto al centro del robot (base_footprint).
    # Tu medicion: camara en world=(41, -28), centro robot en world=(32.5, -28)
    #   -> offset = (41 - 32.5, -28 - (-28)) = (8.5, 0) cm
    camera_x:    0.085     # 8.5 cm forward del centro del robot
    camera_y:    0.0
    camera_yaw:  0.0

    # Frame de la observacion. Con la config del Jetson (reference_frame=camera)
    # aruco_ros NO hace TF y publica la pose en el frame optico de la camara
    # (x=right, y=down, z=forward). Nuestro EKF la convierte a base 2D.
    observation_frame: 'camera_optical'

    # Ruido de medicion ArUco (m^2). aruco_var_base es el ruido a 0 m;
    # aumenta linealmente con la distancia.
    # Con markers de 10 cm a 320x240 px, la pose es ruidosa mas alla de ~1.2 m
    # asi que recortamos el rango maximo y subimos un poco la varianza.
    aruco_var_base:      0.010
    aruco_var_per_meter: 0.015     # crece mas rapido (markers chicos)
    aruco_max_distance:  1.5       # descarta detecciones mas alla de 1.5 m

    # ---------- MAPA DE MARKERS FISICOS ----------
    # Coordenadas medidas EXACTAS de la hoja de calculo del usuario (cm -> m),
    # frame con origen en la esquina inferior-izquierda del laberinto,
    # +X "hacia adentro" del laberinto (arriba en el mapa fisico),
    # +Y a la izquierda del robot (norte en el mapa).
    #
    # Yaws de las flechas del boceto:
    #     →  (arrow right in image)  = -Y  =>  yaw = -pi/2
    #     ↑  (arrow up)              = +X  =>  yaw =  0
    #     ←  (arrow left)            = +Y  =>  yaw =  pi/2
    #     ↓  (arrow down)            = -X  =>  yaw =  pi
    #
    # ID  | (x, y) m         | flecha | yaw
    #  70 | ( 1.85, -0.30)   |  ↓    |  pi      (180 deg)
    # 705 | ( 0.89, -1.20)   |  ←    |  pi/2    ( 90 deg)
    # 706 | ( 2.455,-1.255)  |  ↓    |  pi
    # 708 | ( 1.185,-1.21)   |  →    | -pi/2    (-90 deg)
    # 703 | ( 1.24, -2.07)   |  ↑    |  0
    # 702 | ( 0.27, -1.83)   |  →    | -pi/2
    #  75 | ( 2.75, -2.40)   |  ←    |  pi/2
    # 701 | depende, ver abajo
    #
    # *** 701 puede estar en P1 o P2 - el profesor decide en el momento ***
    # P1: 701 en (1.30, 0.00) yaw=-pi/2   (en la pared izquierda interior)
    # P2: 701 en (2.82, 0.00) yaw=-pi/2   (en la pared superior, lado derecho)
    #
    # Edita la ULTIMA entrada de cada fila (marker_xs y marker_ys) segun
    # corresponda. El yaw es el mismo para los dos casos.
    marker_ids:   [70,    705,    706,    708,     703,   702,     75,     701    ]
    marker_xs:    [1.85,  0.89,   2.455,  1.185,   1.24,  0.27,    2.75,   1.30   ]  # <- 701: 1.30 (P1) o 2.82 (P2)
    marker_ys:    [-0.30, -1.20,  -1.255, -1.21,   -2.07, -1.83,   -2.40,  0.00   ]  # <- 701: 0.00 (igual P1 y P2)
    marker_yaws:  [3.1416, 1.5708, 3.1416, -1.5708, 0.0,   -1.5708, 1.5708, -1.5708]

# --- Bug0: go-to-goal + obstacle avoidance en un solo nodo ---
# Tuneo para pasillos angostos (60 cm) en pista 3 m x 3 m.
bug0:
  ros__parameters:
    control_rate: 20.0
    goal_tolerance: 0.15
    obstacle_distance: 0.30       # 30 cm trigger (antes 15 cm, oscilaba)
    forward_cone_deg: 30.0        # cono mas ancho para detectar paredes a tiempo
    wall_target_distance: 0.25
    wall_sector_min_deg: 60.0
    wall_sector_max_deg: 120.0
    clear_path_cone_deg: 50.0     # cono para verificar si el camino al goal esta libre
    clear_path_distance: 0.6      # distancia minima libre para volver a GO_TO_GOAL
    k_linear: 0.40
    k_angular: 0.8
    max_linear: 0.10
    max_angular: 0.5
    align_threshold_deg: 35.0
    wall_k: 2.0
    wall_linear: 0.05
    wall_progress_threshold: 0.10

# --- Trayectoria (los profesores la dan EN VIVO durante la evaluacion).
# Robot arranca en (0, 0) = esquina inferior-izquierda mirando +X.
# Los profesores dan 4-5 waypoints. Edita waypoints_x / waypoints_y aqui
# justo antes de prender el robot.
#
# manual_advance: TRUE para evaluacion -> robot se detiene en cada waypoint
# y espera senal manual. Para avanzar al siguiente:
#     ros2 topic pub --once /next_waypoint std_msgs/msg/Empty "{}"
#
# loop_trajectory: FALSE para evaluacion (los profes NO quieren loop, es un
# recorrido one-shot que termina en el ultimo waypoint).
#
# Trayectoria PLANTILLA (5 waypoints que evitan paredes obvias del laberinto
# del usuario): borrar y poner la que dicten los profes.
point_generator:
  ros__parameters:
    # interactive_mode: TRUE = el robot NO se mueve solo. Espera goals que
    # vienen del boton "2D Goal Pose" de RViz. La lista de waypoints abajo
    # se IGNORA. Ideal para el demo del 10/jun con profesores.
    # FALSE = usa la lista del yaml (modo evaluacion alternativo).
    interactive_mode: true
    # Estos waypoints SOLO se usan si interactive_mode=false.
    waypoints_x: [1.0,  2.5,  2.0,  1.0,  0.4]
    waypoints_y: [-0.3, -0.8, -1.7, -1.5, -0.5]
    loop_trajectory: false
    manual_advance: false
    startup_delay: 3.0
    frame_id: odom

# --- Adapter aruco_ros -> nuestro msg ---
aruco_ros_bridge:
  ros__parameters:
    input_topic:  '/marker_publisher/markers'
    output_topic: '/aruco_detections'
    # Solo deja pasar markers de nuestro mapa. Bloquea falsos positivos
    # (e.g., un 249 fantasma que aruco_ros a veces mete encima del 702).
    allowed_ids: [70, 706, 75, 701, 703, 705, 708, 702]
    # CORRECCION DE ESCALA: tu calibracion de camara (ost.yaml @ 320x240)
    # sobre-reporta tvec ~46% mas grande que la realidad. Despues de poner
    # marker_size=0.094 en el Jetson, queda ~37% residual. Compensa aqui:
    #     1.0  = sin correccion (calibracion perfecta)
    #     0.73 = corrige el ~37% residual (recomendado para tu setup actual)
    # Cuando recalibren la camara correctamente, pongan 1.0.
    scale_correction: 0.73

# --- Covarianza viz ---
covariance_visualizer:
  ros__parameters:
    sigma_scale: 2.0
    min_axis: 0.05
    marker_frame: ''
