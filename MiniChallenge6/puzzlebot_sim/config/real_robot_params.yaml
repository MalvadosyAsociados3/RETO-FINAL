# Parametros para el Puzzlebot REAL en el Final Challenge.
#
# Layout: 8 markers ArUco distribuidos en una pista tipo laberinto.
# IDs (del boceto del usuario): 70, 706, 75, 701, 703, 705, 708, 702.
# Diccionario por defecto de chev.me/arucogen: DICT_ARUCO_ORIGINAL (1024 markers).
#
# Sistema de coordenadas:
#   - Origen (0,0) = posicion del Puzzlebot al arrancar.
#   - +X = forward inicial del robot (la direccion a la que apunta al arrancar).
#   - +Y = izquierda inicial del robot (REP-103).
#   - theta=0 = apuntando a +X.
#
# Las posiciones de los markers AQUI ABAJO SON UNA PLANTILLA basada en el
# boceto. Hay que MEDIR con cinta metrica la distancia de cada marker al
# origen (X, Y en metros) y su orientacion (yaw: angulo entre la normal del
# marker y el eje +X global).
#
# Truco para el yaw del marker:
#   yaw = 0       -> el marker mira a +X (su normal apunta a +X global)
#   yaw = pi/2    -> el marker mira a +Y (normal hacia la izquierda global)
#   yaw = pi      -> mira a -X (su cara visible es la "espalda" si caminas hacia +X)
#   yaw = -pi/2   -> mira a -Y
# Como regla rapida: pon el marker en su pared, calcula a que direccion apunta
# su CARA con respecto al mundo.

# --- EKF ---
ekf_localisation:
  ros__parameters:
    wheel_radius: 0.05
    wheel_base:   0.19    # valor SIR_DUCK_MODE (que funciona con su EKF)
    update_rate:  50.0
    publish_map_odom_tf: true    # EKF publica map->odom
    odom_frame: odom
    base_frame: base_footprint
    world_frame: map

    # Pose inicial cuando colocas el robot fisicamente con su PARTE TRASERA
    # en la esquina (0,0) inferior-izquierda del laberinto.
    # Segun tu medicion, el CENTRO del robot queda en (0.325, -0.28) m.
    # +X apunta "hacia adentro" del laberinto (vertical hacia arriba en el
    # mapa), +Y a la izquierda del robot (=al norte del mapa).
    # Si vas a poner el robot en otra parte, ajusta estos 3 numeros.
    initial_x:     0.325
    initial_y:    -0.28
    initial_theta: 0.0

    # Incertidumbre inicial (pose medida a mano, no es perfecta)
    initial_cov_xy: 0.02      # m^2 (~14 cm de incertidumbre en x,y)
    initial_cov_theta: 0.1    # rad^2 (~18 deg de incertidumbre en theta)

    # Ruido por rueda. Valores altos = EKF confia MENOS en encoders
    # y da mas peso a ArUco. Subido de 0.03 para scale_correction=1.40.
    # Ruido por rueda SUBIDO — modela el slippage de encoders durante
    # rotaciones. Con valor mas alto, la EKF acepta correcciones ArUco
    # mas grandes para compensar el drift acumulado.
    kr: 0.15
    kl: 0.15

    # Camara: offset respecto al centro del robot (base_footprint).
    # Tu medicion: camara en world=(41, -28), centro robot en world=(32.5, -28)
    #   -> offset = (41 - 32.5, -28 - (-28)) = (8.5, 0) cm
    camera_x:    0.04      # 4 cm forward del centro del robot
    camera_y:    0.0
    camera_yaw:  0.0

    # Frame de la observacion. Con la config del Jetson (reference_frame=camera)
    # aruco_ros NO hace TF y publica la pose en el frame optico de la camara
    # (x=right, y=down, z=forward). Nuestro EKF la convierte a base 2D.
    observation_frame: 'camera_optical'

    # Ruido de medicion ArUco (m^2). aruco_var_base es el ruido a 0 m;
    # aumenta linealmente con la distancia.
    # Valores bajos = EKF confia MAS en ArUco y MENOS en encoders.
    # Necesario porque los encoders acumulan error de theta rapidamente.
    aruco_var_base:      0.001      # bajado: confiar MAS en ArUco
    aruco_var_per_meter: 0.003      # bajado: confiar mas en markers lejanos
    aruco_max_distance:  3.0        # ampliar rango: mas correcciones = menos drift
    # Valores SIR_DUCK_MODE exactos de su YAML.
    aruco_mahal_gate:    5.0
    aruco_max_jump:      2.00

    # ---------- MAPA DE MARKERS FISICOS ----------
    # Coordenadas medidas EXACTAS de la hoja de calculo del usuario (cm -> m),
    # frame con origen en la esquina inferior-izquierda del laberinto,
    # +X "hacia adentro" del laberinto (arriba en el mapa fisico),
    # +Y a la izquierda del robot (norte en el mapa).
    #
    # Yaws de las flechas del boceto:
    #     →  (arrow right in image)  = -Y  =>  yaw = -pi/2
    #     ↑  (arrow up)              = +X  =>  yaw =  0
    #     ←  (arrow left)            = +Y  =>  yaw =  pi/2
    #     ↓  (arrow down)            = -X  =>  yaw =  pi
    #
    # ID  | (x, y) m         | flecha | yaw
    #  70 | ( 1.85, -0.30)   |  ↓    |  pi      (180 deg)
    # 705 | ( 0.89, -1.20)   |  ←    |  pi/2    ( 90 deg)
    # 706 | ( 2.455,-1.255)  |  ↓    |  pi
    # 708 | ( 1.185,-1.21)   |  →    | -pi/2    (-90 deg)
    # 703 | ( 1.24, -2.07)   |  ↑    |  0
    # 702 | ( 0.27, -1.83)   |  →    | -pi/2
    #  75 | ( 2.75, -2.40)   |  ←    |  pi/2
    # 701 | depende, ver abajo
    #
    # *** 701 puede estar en P1 o P2 - el profesor decide en el momento ***
    # P1: 701 en (1.30, 0.00) yaw=-pi/2   (en la pared izquierda interior)
    # P2: 701 en (2.82, 0.00) yaw=-pi/2   (en la pared superior, lado derecho)
    #
    # Edita la ULTIMA entrada de cada fila (marker_xs y marker_ys) segun
    # corresponda. El yaw es el mismo para los dos casos.
    # 701 ACTUALIZADO a P2 (2.82, 0.00) — confirmado por equipo karifm.
    marker_ids:   [70,    705,    706,    708,     703,   702,     75,     701    ]
    marker_xs:    [1.85,  0.89,   2.455,  1.185,   1.24,  0.27,    2.75,   2.82   ]
    marker_ys:    [-0.30, -1.20,  -1.255, -1.21,   -2.07, -1.83,   -2.40,  0.00   ]
    marker_yaws:  [3.1416, 1.5708, 3.1416, -1.5708, 0.0,   -1.5708, 1.5708, -1.5708]

# --- Bug0: go-to-goal + obstacle avoidance en un solo nodo ---
# Tuneo para pasillos angostos (60 cm) en pista 3 m x 3 m.
bug0:
  ros__parameters:
    control_rate: 20.0
    goal_tolerance: 0.15
    obstacle_distance: 0.25       # 25 cm trigger (pasillos angostos)
    forward_cone_deg: 30.0
    wall_target_distance: 0.20   # 20 cm de pared (cabe en pasillo de 60 cm)
    wall_sector_min_deg: 60.0
    wall_sector_max_deg: 120.0
    clear_path_cone_deg: 40.0    # cono mas estrecho para verificar salida
    clear_path_distance: 0.30    # 30 cm libres bastan para salir de FOLLOW_WALL
    k_linear: 0.40
    k_angular: 0.8
    max_linear: 0.10
    max_angular: 0.5
    align_threshold_deg: 35.0
    wall_k: 2.0
    wall_linear: 0.05
    wall_progress_threshold: 0.05  # 5 cm de progreso bastan para intentar salir

# --- Bug2 (sectores + Mano Derecha) ---
# Codigo portado de mobile_robotics: navegacion DETERMINISTA por el laberinto.
# Cuando goal_x > right_wall_goal_x activa modo MANO DERECHA: el robot
# se compromete a seguir la pared derecha hasta ver el marker 75 (deep
# en el maze). Garantia teorica de llegada en laberintos.
bug2:
  ros__parameters:
    controller_update_rate: 25.0
    controller_type: "BUG2"
    distance_tolerance: 0.12
    # Velocidades MUY conservadoras para minimizar slippage de encoders
    # durante rotaciones (causa principal de deriva sin ArUco visible).
    v_max: 0.08                # bajado de 0.10
    w_max: 0.5                 # bajado de 0.7 — rotacion muy lenta
    p2p_v_Kp: 0.5
    p2p_w_Kp: 0.5              # bajado de 0.7
    # Wall-following — MAS MARGEN para evitar que la rueda toque pared en
    # rotaciones (el LiDAR esta en el centro, las ruedas sobresalen ~8cm).
    following_walls_distance: 0.35           # subido — wheel queda a 27cm
    front_stop_distance: 0.30
    lookahead_distance: 0.20                 # bajado de 0.30 — outer corner mas estricto
    bug2_line_tol: 0.30                  # relajado de 0.20 — sale antes de wall
    min_wall_follow_distance: 0.05
    fw_w_Kp: 0.5                             # bajado para suavidad
    fw_e_Kp: 2.0                             # bajado
    fw_linear_speed: 0.06                    # bajado — 6 cm/s en wall
    fw_outer_corner_angular_speed: 0.4       # bajado — corner muy suave
    fw_outer_corner_linear_speed: 0.10
    # Aperturas angulares (rad)
    # AMPLIADAS para cerrar el "dead zone" donde la rueda chocaba sin ser
    # detectada (entre front sector y side sector).
    side_open_angle: 0.9      # antes 0.5236 — cubre +/- 52deg desde 90deg
    front_open_angle: 0.5     # antes 0.4 — cubre +/- 29deg
    # Offset LiDAR: 0.0 confirmado por usuario — el LiDAR fisicamente apunta
    # al frente del robot, no necesita rotacion en software.
    lidar_yaw_offset: 0.0
    # Suavizado angular (rad/s^2)
    max_w_accel: 4.0
    # Waypoints de la imagen del usuario:
    #   (1) 0.36, -0.275  ← punto de partida
    #   (2) 0.36, -0.94
    #   (3) 0.36, -2.72
    #   (4) 2.10, -0.30
    #   (5) 2.72, -2.72
    #   (6) 1.70, -2.04
    # Lista vacia = espera goals por /current_goal del point_generator.
    waypoints_x: []
    waypoints_y: []
    loop: false
    # CALIBRACION desactivada — usuario reporto que avanzar al principio
    # antes de poder ver markers laterales hace que se pierda mas.
    calibration_enable: false
    calibration_speed: 0.04
    calibration_max_time: 10.0
    calibration_min_detections: 15

# --- Trayectoria (los profesores la dan EN VIVO durante la evaluacion).
# Robot arranca en (0, 0) = esquina inferior-izquierda mirando +X.
# Los profesores dan 4-5 waypoints. Edita waypoints_x / waypoints_y aqui
# justo antes de prender el robot.
#
# manual_advance: TRUE para evaluacion -> robot se detiene en cada waypoint
# y espera senal manual. Para avanzar al siguiente:
#     ros2 topic pub --once /next_waypoint std_msgs/msg/Empty "{}"
#
# loop_trajectory: FALSE para evaluacion (los profes NO quieren loop, es un
# recorrido one-shot que termina en el ultimo waypoint).
#
# Trayectoria PLANTILLA (5 waypoints que evitan paredes obvias del laberinto
# del usuario): borrar y poner la que dicten los profes.
point_generator:
  ros__parameters:
    # interactive_mode: TRUE = espera goals de RViz "2D Goal Pose" o `goal X Y`.
    # FALSE = sigue la lista de waypoints abajo (modo evaluacion automatica).
    interactive_mode: true
    # Trayectoria de prueba: linea recta corta para verificar que el
    # robot avanza sin desfasarse. Cambiar por los waypoints del profe.
    waypoints_x: [0.69]
    waypoints_y: [-1.20]
    loop_trajectory: false
    manual_advance: true
    startup_delay: 3.0
    frame_id: map

# --- Adapter aruco_ros -> nuestro msg ---
aruco_ros_bridge:
  ros__parameters:
    input_topic:  '/marker_publisher/markers'
    output_topic: '/aruco_detections'
    # Solo deja pasar markers de nuestro mapa. Bloquea falsos positivos
    # (e.g., un 249 fantasma que aruco_ros a veces mete encima del 702).
    allowed_ids: [70, 706, 75, 701, 703, 705, 708, 702]
    # CORRECCION DE ESCALA: tu calibracion de camara (ost.yaml @ 320x240)
    # sobre-reporta tvec ~46% mas grande que la realidad. Despues de poner
    # marker_size=0.094 en el Jetson, queda ~37% residual. Compensa aqui:
    #     1.0  = sin correccion (calibracion perfecta)
    #     0.73 = corrige el ~37% residual (recomendado para tu setup actual)
    # Cuando recalibren la camara correctamente, pongan 1.0.
    # Calculado de medidas reales: promedio(real_z / tvec_z) = 0.696
    # Ratios por marker: 70→0.684, 75→0.680, 702→0.685, 703→0.674,
    #   705→0.718, 706→0.702, 708→0.711, 701P1→0.728, 701P2→0.683
    scale_correction: 1.40

# --- Covarianza viz ---
covariance_visualizer:
  ros__parameters:
    sigma_scale: 2.0
    min_axis: 0.05
    marker_frame: ''
