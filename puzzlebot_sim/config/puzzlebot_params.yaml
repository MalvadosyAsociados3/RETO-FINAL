# Parametros comunes
# CUADRADO de 1 m.


puzzlebot_sim:
  ros__parameters:
    wheel_radius: 0.05
    wheel_base: 0.19
    update_rate: 50.0
    publish_tf: false   # localisation se encarga del TF odom->base_footprint

localisation:
  ros__parameters:
    wheel_radius: 0.05
    wheel_base: 0.19
    update_rate: 50.0
    publish_map_odom_tf: true
    odom_frame: odom
    base_frame: base_footprint
    world_frame: map
    initial_x: 0.0
    initial_y: 0.0
    initial_theta: 0.0
    kr: 0.02
    kl: 0.02

point_generator:
  ros__parameters:
    # Trayectoria CUADRADO 1m
    waypoints_x: [1.0, 1.0, 0.0, 0.0]
    waypoints_y: [0.0, 1.0, 1.0, 0.0]
    loop_trajectory: true
    startup_delay: 1.5
    frame_id: odom

control:
  ros__parameters:
    max_linear_vel: 0.2
    max_angular_vel: 1.0
    k_linear: 0.9
    k_angular: 5.0
    yaw_tolerance: 0.05
    position_tolerance: 0.08
    stabilize_time: 0.5
    control_rate: 20.0

# --- Mini Challenge 6: Bug 0 ---
bug0:
  ros__parameters:
    control_rate: 20.0
    goal_tolerance: 0.15
    obstacle_distance: 0.5        # threshold del cono frontal
    forward_cone_deg: 30.0        # +-15 deg (segun actividad Manchester)
    wall_target_distance: 0.35    # distancia a la pared a mantener
    wall_sector_min_deg: 60.0     # sector LiDAR izquierdo (pared izquierda)
    wall_sector_max_deg: 120.0
    clear_path_cone_deg: 50.0     # cono para decidir "camino al goal libre"
    clear_path_distance: 0.8
    k_linear: 0.5                 # P go-to-goal
    k_angular: 1.5
    max_linear: 0.18
    max_angular: 1.0
    align_threshold_deg: 25.0     # si error angular > este -> gira en sitio
    wall_k: 2.5                   # P wall following
    wall_linear: 0.10
    wall_progress_threshold: 0.10 # anti-oscilacion al salir de FOLLOW_WALL

# --- Mini Challenge 6: Bug 2 ---
bug2:
  ros__parameters:
    control_rate: 20.0
    goal_tolerance: 0.15
    obstacle_distance: 0.5
    forward_cone_deg: 30.0
    wall_target_distance: 0.35
    wall_sector_min_deg: 60.0
    wall_sector_max_deg: 120.0
    m_line_tolerance: 0.10        # tolerancia a la linea M para LEAVE
    hit_min_distance: 0.20        # distancia minima desde hit point antes de LEAVE
    progress_threshold: 0.10      # dist(actual,goal) debe ser < dist(hit,goal) - este
    k_linear: 0.5
    k_angular: 1.5
    max_linear: 0.18
    max_angular: 1.0
    align_threshold_deg: 25.0
    wall_k: 2.5
    wall_linear: 0.10
